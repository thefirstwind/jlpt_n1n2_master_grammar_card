# Cloudflare Pages：与 GitHub Pages 二选一。Pages 可走同源 /api/grammar-sync，iPad Safari 更稳。
name = "jlpt-n1n2-grammar-card"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "SYNC_KV"
id = "2081d8db42e04f12b55b1492b3f6906b"

# 部署：cd 语法复习 && npx wrangler pages deploy . --config wrangler.pages.toml
# 然后在 Pages 控制台绑定 KV（名称 SYNC_KV，id 与 cloudflare-worker/wrangler.toml 相同）
# 配置：python enable_cloud_sync.py --same-origin
